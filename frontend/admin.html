<!DOCTYPE html>
<html>
<head>

<title>MediQ Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
padding:20px;
}

.cards{
display:flex;
gap:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
min-width:150px;
}

.request{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.billing{background:#10b981;color:white;}
.ot{background:#6366f1;color:white;}

canvas{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<h2>Hospital Insights</h2>

<div class="cards">

<div class="card">
<h3>Total Queries</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pending">0</p>
</div>

<div class="card">
<h3>Resolved</h3>
<p id="resolved">0</p>
</div>

<div class="card">
<h3>Emergency</h3>
<p id="emergency">0</p>
</div>

</div>

<canvas id="deptChart"></canvas>

<h2>Admin Requests</h2>

<div id="adminRequests"></div>

<script>

const API="http://localhost:5000"
const token=localStorage.getItem("token")

if(!token){
alert("Please login first")
location="index.html"
}

async function loadAnalytics(){

const res=await fetch(API+"/api/admin/analytics",{
headers:{Authorization:"Bearer "+token}
})

const data=await res.json()

document.getElementById("total").innerText=data.total
document.getElementById("pending").innerText=data.pending
document.getElementById("resolved").innerText=data.resolved
document.getElementById("emergency").innerText=data.emergency

new Chart(document.getElementById("deptChart"),{

type:"bar",

data:{
labels:["Cardiology","Neurology","Radiology","General Medicine"],

datasets:[{
label:"Requests",
data:[
data.cardiology||0,
data.neurology||0,
data.radiology||0,
data.general||0
]
}]
}

})

}

async function loadRequests(){

const res=await fetch(API+"/api/requests/role/Admin",{
headers:{Authorization:"Bearer "+token}
})

const data=await res.json()

const container=document.getElementById("adminRequests")

if(!data.length){
container.innerHTML="<p>No admin requests</p>"
return
}

container.innerHTML=data.map(r=>`

<div class="request">

<h4>${r.patientName}</h4>
<p>${r.description||""}</p>

<button class="billing"
onclick="forward('${r._id}','Billing')">

Forward to Billing

</button>

<button class="ot"
onclick="forward('${r._id}','OT')">

Forward to OT

</button>

</div>

`).join("")

}

async function forward(id,destination){

await fetch(API+"/api/requests/forward/"+id,{
method:"PUT",
headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
},
body:JSON.stringify({destination})
})

alert("Request forwarded")

loadRequests()

}

loadAnalytics()
loadRequests()

</script>

</body>
</html>
