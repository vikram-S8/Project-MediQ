<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finance & Billing Control</title>
<style>
:root { --bg:#f8fafc; --card:#fff; --primary:#3b82f6; --success:#22c55e; --text:#1e293b; }
body { font-family: Arial; background:var(--bg); padding:20px; color:var(--text); }
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.dashboard-grid{display:grid;grid-template-columns:350px 1fr;gap:20px;}
.panel{background:#fff;padding:20px;border-radius:12px;}
.request-item{border:1px solid #e2e8f0;padding:15px;border-radius:8px;margin-bottom:15px;}
.btn{cursor:pointer;padding:10px 20px;border:none;border-radius:6px;font-weight:600;color:white;}
.btn-process{background:var(--primary);width:100%;}
.btn-success{background:var(--success);}
</style>
</head>

<body>

<div class="header">
<h1>💰 Billing & Reports</h1>
<button onclick="logout()" style="background:#ef4444" class="btn">Logout</button>
</div>

<div class="dashboard-grid">

<div class="panel">
<h3>Pending Billing Requests</h3>
<div id="request-list"></div>
</div>

<div class="panel">
<h3>Patient Report Preview</h3>
<div id="report-preview" style="border:2px dashed #e2e8f0;padding:20px;min-height:300px">
<p style="color:#94a3b8;text-align:center;margin-top:100px">
Select a request to generate a report.
</p>
</div>
</div>

</div>

<script>

const token = localStorage.getItem("token")

async function load(){

try{

const res = await fetch(
"http://localhost:5000/api/requests/role/Billing",
{
headers:{ "Authorization":"Bearer "+token }
}
)

const data = await res.json()

const list = document.getElementById("request-list")

if(!Array.isArray(data) || data.length===0){
list.innerHTML="<p>No billing requests</p>"
return
}

list.innerHTML = data.map(r=>`

<div class="request-item">

<strong>${r.patientName}</strong><br>
<small>Admission ID: ${r._id.substring(0,8)}</small>

<button class="btn btn-process"
onclick="process('${r._id}','${r.patientName}')">

Generate Bill

</button>

</div>

`).join("")

}catch(err){

console.error("Billing error",err)

}

}

function process(id,name){

document.getElementById("report-preview").innerHTML=`

<h3>Final Patient Report</h3>

<p><strong>Patient:</strong> ${name}</p>

<hr>

<p>Medicine Cost: $120</p>
<p>Procedure Fees: $300</p>
<p>Insurance Deduction: -$100</p>

<h2>Total Due: $320</h2>

<button onclick="completeStage('${id}')"
class="btn btn-success">

Finalize & Send OT

</button>

`

}

async function completeStage(id){

await fetch(
"http://localhost:5000/api/requests/next/"+id,
{
method:"PUT",
headers:{ "Authorization":"Bearer "+token }
}
)

alert("Billing complete")

load()

document.getElementById("report-preview").innerHTML=""

}

function logout(){

localStorage.clear()
location="index.html"

}

load()

</script>

</body>
</html>
