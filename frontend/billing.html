<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance & Billing Control</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #3b82f6; --success: #22c55e; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 20px; color: var(--text); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Billing Card Styling */
        .request-item { border: 1px solid #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .price-tag { font-size: 1.2rem; font-weight: bold; color: var(--primary); }
        
        /* Modal for Billing */
        #billing-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; }
        .modal-content { background: white; width: 600px; padding: 30px; border-radius: 16px; max-height: 80vh; overflow-y: auto; }
        
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn { cursor: pointer; padding: 10px 20px; border: none; border-radius: 6px; font-weight: 600; color: white; }
        .btn-process { background: var(--primary); width: 100%; }
        .btn-success { background: var(--success); }
    </style>
</head>
<body>

    <div class="header">
        <h1>💰 Billing & Reports</h1>
        <button onclick="logout()" style="background:#ef4444;" class="btn">Logout</button>
    </div>

    <div class="dashboard-grid">
        <div class="panel">
            <h3>Pending Admin Requests</h3>
            <div id="request-list"></div>
        </div>

        <div class="panel">
            <h3>Patient Report Preview</h3>
            <div id="report-preview" style="border: 2px dashed #e2e8f0; padding: 20px; min-height: 300px;">
                <p style="color:#94a3b8; text-align:center; margin-top:100px;">Select a request to generate a report.</p>
            </div>
        </div>
    </div>

    <div id="billing-modal">
        <div class="modal-content">
            <h2>Generate Final Bill</h2>
            <input type="hidden" id="modal-req-id">
            <label>Medicines Cost:</label>
            <input type="number" id="cost-meds" placeholder="0.00">
            <label>Service/Procedure Fees:</label>
            <input type="number" id="cost-fees" placeholder="0.00">
            <label>Insurance Coverage:</label>
            <input type="number" id="cost-insurance" placeholder="0.00">
            
            <button class="btn btn-process" onclick="finalizeBill()">Generate Report & Complete</button>
            <button class="btn" style="background:#64748b; margin-top:10px; width:100%;" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <script>
        const token = localStorage.getItem("token");

        async function load() {
            const res = await fetch("http://localhost:5000/api/requests/Billing", {
                headers: { "Authorization": token }
            });
            const data = await res.json();
            const list = document.getElementById("request-list");
            list.innerHTML = data.map(r => `
                <div class="request-item">
                    <strong>${r.patientName}</strong><br>
                    <small>Admission ID: ${r._id.substring(0,8)}</small>
                    <button class="btn btn-process" style="margin-top:10px;" onclick="openBilling('${r._id}', '${r.patientName}')">Process Bill</button>
                </div>
            `).join('');
        }

        function openBilling(id, name) {
            document.getElementById("modal-req-id").value = id;
            document.getElementById("billing-modal").style.display = "flex";
        }

        function closeModal() { document.getElementById("billing-modal").style.display = "none"; }

        async function finalizeBill() {
            const id = document.getElementById("modal-req-id").value;
            const meds = document.getElementById("cost-meds").value;
            const fees = document.getElementById("cost-fees").value;
            const ins = document.getElementById("cost-insurance").value;
            
            const total = parseFloat(meds) + parseFloat(fees) - parseFloat(ins);

            // Display Report Preview
            document.getElementById("report-preview").innerHTML = `
                <h3>Final Patient Report</h3>
                <p><strong>Patient:</strong> ${id}</p>
                <hr>
                <p>Medicines: $${meds}</p>
                <p>Procedures: $${fees}</p>
                <p>Insurance Deduction: -$${ins}</p>
                <h2 style="color:var(--success)">Total Due: $${total.toFixed(2)}</h2>
                <button class="btn btn-success" onclick="completeStage('${id}')">Print & Discharge</button>
            `;
            closeModal();
        }

        async function completeStage(id) {
            await fetch("http://localhost:5000/api/requests/next/" + id, {
                method: "PUT",
                headers: { "Authorization": token }
            });
            alert("Report finalized and patient discharged.");
            load();
            document.getElementById("report-preview").innerHTML = "";
        }

        function logout() { localStorage.clear(); location = "index.html"; }
        load();
    </script>
</body>
</html>
