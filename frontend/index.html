<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Portal | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Updated to a teal/greenish-blue palette */
            --primary: #0d9488;
            --primary-hover: #115e59;
            --bg-gradient: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 100%);
            --card-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-gradient); 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white; 
            padding: 40px; 
            width: 100%; 
            max-width: 360px; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow);
        }
        /* Logo Container */
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo img {
            width: 160px; /* Adjust size as needed */
            height: auto;
        }
        
        .input-group { margin-bottom: 16px; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #cbd5e1; 
            border-radius: 8px; box-sizing: border-box; font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px #ccfbf1; }
        
        button { 
            width: 100%; padding: 12px; background: var(--primary); 
            color: white; border: none; border-radius: 8px; font-weight: 600; 
            cursor: pointer; transition: background 0.2s; margin-top: 8px;
        }
        button:hover { background: var(--primary-hover); }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
    </style>
</head>

<body>
<div class="card">
    <div class="logo">
        <img src="logo.png" alt="Hospital Logo">
    </div>
    
    <div class="input-group">
        <input id="email" placeholder="Institutional Email">
    </div>
    <div class="input-group">
        <input id="password" type="password" placeholder="Password">
    </div>
    <button id="loginBtn" onclick="login()">Sign In</button>
</div>

<script>
    async function login() {
        const btn = document.getElementById("loginBtn");
        btn.innerText = "Authenticating...";
        btn.disabled = true;

        try {
            const res = await fetch("http://localhost:5000/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    email: document.getElementById("email").value,
                    password: document.getElementById("password").value
                })
            });

            if (!res.ok) throw new Error("Invalid credentials");

            const data = await res.json();

            localStorage.setItem("token", data.token);
            localStorage.setItem("role", data.role);

            const routes = {
                "Doctor": "doctor.html",
                "Admin": "admin.html",
                "Billing": "billing.html",
                "OT": "ot.html",
                "Patient": "patient.html"
            };

            if (routes[data.role]) {
                location.href = routes[data.role];
            } else {
                alert("Role not recognized.");
            }
        } catch (err) {
            alert("Login Failed: " + err.message);
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
