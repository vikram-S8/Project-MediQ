<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patient Dashboard | MediQ</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
background:#eef2ff;
padding:20px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="header">
<h2>Patient Dashboard</h2>
<button onclick="logout()">Logout</button>
</div>

<div class="card">

<h3>Submit Healthcare Query</h3>

<form onsubmit="submitQuery(event)">

<input id="name" placeholder="Patient Name" required>

<select id="category" required>
<option value="">Query Category</option>
<option>Symptom</option>
<option>Report Review</option>
<option>Appointment</option>
<option>Emergency</option>
</select>

<select id="department" required>
<option value="">Department</option>
<option>Cardiology</option>
<option>Neurology</option>
<option>Radiology</option>
<option>General Medicine</option>
</select>

<select id="priority">
<option>Normal</option>
<option>Urgent</option>
<option>Emergency</option>
</select>

<textarea id="description" placeholder="Describe symptoms or query"></textarea>

<button type="submit">Submit Query</button>

</form>

</div>

<div class="card">

<h3>My Requests</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Category</th>
<th>Department</th>
<th>Status</th>
<th>Progress</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<script>

const API="http://localhost:5000/api/query"

const token=localStorage.getItem("token")

if(!token){
alert("Please login first")
location="index.html"
}

// ================= CREATE QUERY =================

async function submitQuery(e){

e.preventDefault()

try{

const res=await fetch(API+"/create",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({

patientName:document.getElementById("name").value,
category:document.getElementById("category").value,
department:document.getElementById("department").value,
priority:document.getElementById("priority").value,
description:document.getElementById("description").value

})

})

const data=await res.json()

if(!res.ok){
throw new Error(data.msg || "Failed to create query")
}

alert("Query submitted successfully")

document.querySelector("form").reset()

loadQueries()

}catch(err){

alert(err.message)

}

}

// ================= LOAD USER QUERIES =================

async function loadQueries(){

try{

const res=await fetch(API+"/my",{

headers:{
"Authorization":"Bearer "+token
}

})

const data=await res.json()

const table=document.getElementById("table")

if(!Array.isArray(data)){
table.innerHTML="<tr><td colspan='5'>No data</td></tr>"
return
}

table.innerHTML=data.map(q=>`

<tr>

<td>${q._id.substring(0,6)}</td>
<td>${q.category}</td>
<td>${q.department}</td>
<td>${q.status}</td>
<td>${q.progress || 10}%</td>

</tr>

`).join("")

}catch(err){

console.error("Load error",err)

}

}

// ================= LOGOUT =================

function logout(){

localStorage.clear()
location="index.html"

}

loadQueries()

</script>

</body>
</html>
