<!DOCTYPE html>
<html>
<head>

<title>Doctor Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.admin{background:#8b5cf6;color:white;}
.lab{background:#10b981;color:white;}
.ai{background:#0ea5e9;color:white;}

</style>
</head>

<body>

<h2>Doctor Dashboard</h2>

<div id="container"></div>

<script>

const API="http://localhost:5000"
const token=localStorage.getItem("token")

if(!token){
alert("Please login first")
location="index.html"
}

// ================= LOAD PATIENT REQUESTS =================

async function load(){

try{

const res=await fetch(API+"/api/query/department/Cardiology",{

headers:{
"Authorization":"Bearer "+token
}

})

const data=await res.json()

const container=document.getElementById("container")

if(!Array.isArray(data) || data.length===0){

container.innerHTML="<p>No patient requests yet</p>"
return

}

container.innerHTML=data.map(r=>`

<div class="card">

<h3>${r.patientName}</h3>

<p>${r.description || "No description"}</p>

<p><b>Priority:</b> ${r.priority}</p>

<p><b>Status:</b> ${r.status}</p>

<button class="ai" onclick="aiSuggest('${r.description || ""}')">
AI Suggest
</button>

<button class="admin" onclick="forward('${r._id}','Admin')">
Send Admin
</button>

<button class="lab" onclick="forward('${r._id}','Lab')">
Send Lab
</button>

<button onclick="resolve('${r._id}')">
Resolve
</button>

</div>

`).join("")

}catch(err){

console.error(err)

}

}

// ================= AI SUGGESTION =================

async function aiSuggest(text){

try{

const res=await fetch(API+"/api/ai/suggest",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({text})

})

const data=await res.json()

alert("AI Suggestion: "+data.suggestion)

}catch(err){

alert("AI service error")

}

}

// ================= FORWARD REQUEST =================

async function forward(id,destination){

try{

await fetch(API+"/api/query/forward/"+id,{

method:"PUT",

headers:{
"Authorization":"Bearer "+token,
"Content-Type":"application/json"
},

body:JSON.stringify({destination})

})

load()

}catch(err){

console.error(err)

}

}

// ================= RESOLVE =================

async function resolve(id){

try{

await fetch(API+"/api/query/next/"+id,{

method:"PUT",

headers:{
"Authorization":"Bearer "+token
}

})

load()

}catch(err){

console.error(err)

}

}

load()

</script>

</body>
</html>
