<!DOCTYPE html>
<html>
<head>
<title>Patient Dashboard</title>
<style>
body { font-family: Arial; background:#eef5ff; text-align:center; }
.card {
  background:white; padding:20px; margin:100px auto;
  width:300px; border-radius:10px; box-shadow:0 0 10px #ccc;
}
button {
  background:#007bff; color:white; border:none;
  padding:10px; width:100%; border-radius:5px;
}
</style>
</head>

<body>
<div class="card">
<h2>👤 Patient Portal</h2>

<input id="name" placeholder="Patient Name"><br><br>
<input id="type" placeholder="Request Type (Surgery)"><br><br>

<button onclick="create()">Submit Request</button>
</div>

<script>
async function create(){
  await fetch("http://localhost:5000/create",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      patientName:name.value,
      type:type.value
    })
  });
  alert("✅ Request Created");
}
</script>
</body>
</html>
